<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ragnarok Stat Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="status-panel">
    <h2>Ragnarok Stat Simulator</h2>

    <div class="main-layout">
        <!-- LEFT PANEL: Character + HP/SP -->
        <div class="left-panel">
            
            <div class="gender-switch">
                <label class="switch">
                    <input type="checkbox" id="genderToggle">
                    <span class="slider">
                        <span class="gender-symbol">♂</span>
                    </span>
                </label>
            </div>

            <div class="character-box">
                <img src="jobs/novice.gif" alt="character animation" class="character-gif">
            </div>

            <div class="hp-sp-box">
                <div class="bar-row">
                    <span>HP</span>
                    <div class="custom-bar">
                        <div id="hpBar" class="fill hp-fill">
                            <span id="hpText">0%</span>
                        </div>
                    </div>
                </div>

                <div class="bar-row">
                    <span>SP</span>
                    <div class="custom-bar">
                        <div id="spBar" class="fill sp-fill">
                            <span id="spText">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Setup + Tables -->
        <div class="right-panel">

            <!-- Character Setup -->
            <div class="character-setup">
                <h3>Character Setup</h3>
                <div class="setup-row">
                    <label>Base Level:</label>
                    <input type="number" id="baseLevel" value="1" min="1" max="99">
                </div>

                <div class="setup-row">
                    <label>Job Level:</label>
                    <input type="number" id="jobLevel" value="1" min="1" max="50">
                </div>
                <div class="setup-row">
                    <label>Job:</label>
                    <select id="job">
                        <option>Novice</option>
                        <option>Swordsman</option>
                        <option>Mage</option>
                        <option>Archer</option>
                        <option>Thief</option>
                        <option>Acolyte</option>
                        <option>Merchant</option>
                    </select>
                </div>
                <div class="setup-row">
                    <label>Weapon:</label>
                    <select id="weapon">
                        <option>Hand</option>
                        <option>Sword</option>
                        <option>Bow</option>
                        <option>Staff</option>
                        <option>Dagger</option>
                    </select>
                </div>
            </div>

            <!-- Two side-by-side boxes -->
            <div class="tables-container">

                <!-- Stats Table Box -->
                <div class="table-box">
                    <h4>Stats</h4>
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>Stat</th>
                                <th>Value</th>
                                <th>Req</th>
                                <th>Job Bonus</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>STR</td><td><input type="number" id="str" value="1" min="1"></td><td id="strReq">2</td><td id="strBonus">0</td></tr>
                            <tr><td>AGI</td><td><input type="number" id="agi" value="1" min="1"></td><td id="agiReq">2</td><td id="agiBonus">0</td></tr>
                            <tr><td>VIT</td><td><input type="number" id="vit" value="1" min="1"></td><td id="vitReq">2</td><td id="vitBonus">0</td></tr>
                            <tr><td>INT</td><td><input type="number" id="int" value="1" min="1"></td><td id="intReq">2</td><td id="intBonus">0</td></tr>
                            <tr><td>DEX</td><td><input type="number" id="dex" value="1" min="1"></td><td id="dexReq">2</td><td id="dexBonus">0</td></tr>
                            <tr><td>LUK</td><td><input type="number" id="luk" value="1" min="1"></td><td id="lukReq">2</td><td id="lukBonus">0</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Status Info Box -->
                <div class="table-box">
                    <h4>Status Information</h4>
                    <div class="status-columns">
                        <!-- Left Column -->
                        <table class="status-table">
                            <tbody>
                                <tr>
                                    <th><img src="icons/atk.png" class="stat-icon"> ATK</th>
                                    <td id="atk">1 + 0</td>
                                    </tr>
                                    
                                    <tr>
                                    <th><img src="icons/matk.png" class="stat-icon"> MATK</th>
                                    <td id="matk">1~1</td>
                                    </tr>
                                    
                                    <tr>
                                    <th><img src="icons/hit.png" class="stat-icon"> HIT</th>
                                    <td id="hit">2</td>
                                    </tr>
                                    
                                    <tr>
                                    <th><img src="icons/crit.png" class="stat-icon"> CRIT</th>
                                    <td id="critical">1</td>
                                    </tr>
                            </tbody>
                        </table>
                        <!-- Right Column -->
                        <table class="status-table">
                            <tbody>
                                <tr>
                                    <th><img src="icons/def.png" class="stat-icon"> DEF</th>
                                    <td id="def">0 + 0</td>
                                    </tr>
                                    
                                    <tr>
                                    <th><img src="icons/mdef.png" class="stat-icon"> MDEF</th>
                                    <td id="mdef">0 + 0</td>
                                    </tr>
                                <tr><th>FLEE</th><td id="flee">2 + 0</td></tr>
                                <tr><th>ASPD</th><td id="aspd">150</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <br/>

                    <!-- Remaining Points inside Status Box -->
                    <div class="status-points">
                        Remaining Points: <span id="statusPoints">0</span>
                    </div>
                    <!-- Floating cartoon leaves/flowers -->
                    <div class="floating-elements">
                        <div class="leaf">🍃</div>
                        <div class="leaf">🍀</div>
                        <div class="leaf">🌸</div>
                        <div class="leaf">🍁</div>
                        <div class="leaf">🌼</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
